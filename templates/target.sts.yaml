---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "tperf.target-name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "tperf.target-name" . }}
spec:
  serviceName: target
  replicas: {{ .Values.replicas }} 
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 100%
  selector:
    matchLabels:
      app: {{ include "tperf.target-name" . }}
  template:
    metadata:
      labels:
        app: {{ include "tperf.target-name" . }}
    spec:
      containers:
      - name: target
        image: busybox:latest
        command:
        - /bin/sh
        - -c
        - |
          trap 'exit 0' TERM INT
          while true; do
            sleep 10 &
            wait $!
            echo 'TODO: Run tests'
          done